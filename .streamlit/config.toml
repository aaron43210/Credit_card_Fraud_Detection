[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1f2937"
textColor = "#f8fafc"
font = "sans serif"

[client]
showErrorDetails = true
showUploaderFileUploadStatusInBar = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = true
port = 8501

[browser]
gatherUsageStats = false
